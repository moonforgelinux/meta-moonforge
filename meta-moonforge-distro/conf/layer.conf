# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-moonforge-distro"
BBFILE_PATTERN_meta-moonforge-distro = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-moonforge-distro = "6"

LAYERDEPENDS_meta-moonforge-distro = "core"
LAYERSERIES_COMPAT_meta-moonforge-distro = "wrynose"
