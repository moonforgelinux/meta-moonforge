# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-moonforge-docker"
BBFILE_PATTERN_meta-moonforge-docker = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-moonforge-docker = "9"

LAYERDEPENDS_meta-moonforge-docker = " \
    core \
    virtualization-layer \
"
LAYERSERIES_COMPAT_meta-moonforge-docker = "scarthgap"
