# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-moonforge-podman"
BBFILE_PATTERN_meta-moonforge-podman = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-moonforge-podman = "9"

LAYERDEPENDS_meta-moonforge-podman = " \
    core \
    virtualization-layer \
"
LAYERSERIES_COMPAT_meta-moonforge-podman = "scarthgap"
