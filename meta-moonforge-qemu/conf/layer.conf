# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-moonforge-qemu"
BBFILE_PATTERN_meta-moonforge-qemu = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-moonforge-qemu = "7"

LAYERDEPENDS_meta-moonforge-qemu = "core"
LAYERSERIES_COMPAT_meta-moonforge-qemu = "wrynose"
