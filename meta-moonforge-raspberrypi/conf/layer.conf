# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-moonforge-raspberrypi"
BBFILE_PATTERN_meta-moonforge-raspberrypi = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-moonforge-raspberrypi = "10"

LAYERDEPENDS_meta-moonforge-raspberrypi = " \
    core \
    lts-u-boot-mixin \
    raspberrypi \
"
LAYERSERIES_COMPAT_meta-moonforge-raspberrypi = "scarthgap"
