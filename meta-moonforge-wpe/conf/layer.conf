# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-moonforge-wpe"
BBFILE_PATTERN_meta-moonforge-wpe = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-moonforge-wpe = "8"

LAYERDEPENDS_meta-moonforge-wpe = " \
    core \
    webkit \
"
LAYERSERIES_COMPAT_meta-moonforge-wpe = "scarthgap"
